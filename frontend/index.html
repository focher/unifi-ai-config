<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniFi AI Config Auditor</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>🛡️ UniFi AI Config Auditor <span id="appVersion" class="version"></span></h1>
    <nav>
      <button data-view="dashboard" class="active">Dashboard</button>
      <button data-view="settings">Settings</button>
    </nav>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="view-dashboard" class="view active">

      <!-- STEP 1: COLLECT -->
      <div class="step-card">
        <div class="step-head">
          <span class="step-num">1</span>
          <h2>Collect configuration &amp; traffic</h2>
          <button id="collectBtn" class="primary">⬇ Collect from controller</button>
        </div>
        <div id="collectProgress" class="progress-grid hidden"></div>
        <div id="collectStatus" class="status"></div>

        <div id="collectedData" class="collected hidden">
          <div class="collected-head">
            <h3>Collected data</h3>
            <label class="redact-toggle" title="Mask passphrases, PSKs, and keys">
              <input type="checkbox" id="redactToggle" checked /> Redact secrets
            </label>
            <select id="dataSnapshotSelect" title="Snapshot to browse"></select>
            <button id="downloadAllBtn" class="small">⬇ Download all (JSON)</button>
            <button id="addAllBtn" class="small">Add all to analysis →</button>
          </div>
          <div id="sectionList" class="section-list"></div>
        </div>
      </div>

      <!-- STEP 2: ANALYZE -->
      <div class="step-card">
        <div class="step-head">
          <span class="step-num">2</span>
          <h2>Analyze with LLM</h2>
          <button id="analyzeBtn" class="primary">🔍 Analyze selected</button>
        </div>
        <div class="analyze-sel-head">
          <span class="muted">Sections to analyze (<span id="selCount">0</span>):</span>
          <button id="removeAllBtn" class="small">Remove all</button>
        </div>
        <div id="analyzeSelection" class="sel-list"></div>
        <div id="analyzeProgress" class="chunk-list hidden"></div>
        <div id="analyzeStatus" class="status"></div>
      </div>

      <!-- RESULTS -->
      <div class="toolbar">
        <label class="muted">Results:</label>
        <select id="resultSelect"></select>
        <span id="status" class="status"></span>
      </div>

      <div id="summaryBar" class="summary-bar hidden"></div>
      <p id="summaryText" class="summary-text"></p>

      <div class="filters" id="filters">
        <label><input type="checkbox" class="sev-filter" value="Critical" checked /> Critical</label>
        <label><input type="checkbox" class="sev-filter" value="High" checked /> High</label>
        <label><input type="checkbox" class="sev-filter" value="Medium" checked /> Medium</label>
        <label><input type="checkbox" class="sev-filter" value="Low" checked /> Low</label>
        <span class="spacer"></span>
        <label><input type="checkbox" id="hideResolved" /> Hide ignored/remediated</label>
      </div>

      <div id="issues"></div>
      <div id="empty" class="empty">No analysis yet. Configure your controller and LLM in
        <a href="#" data-view="settings">Settings</a>, then run an analysis.</div>
    </section>

    <!-- SETTINGS -->
    <section id="view-settings" class="view">
      <h2>UniFi Controller</h2>
      <div class="grid">
        <label>Host / IP<input id="u_host" placeholder="https://10.0.0.1" /></label>
        <label>Port<input id="u_port" type="number" value="443" /></label>
        <label>Username<input id="u_user" autocomplete="off" /></label>
        <label>Password<input id="u_pass" type="password" autocomplete="new-password" /></label>
        <label>Site<input id="u_site" value="default" /></label>
        <label class="check">UniFi OS console (UDM/Cloud Key Gen2+)
          <input id="u_unifios" type="checkbox" checked /></label>
        <label class="check">Verify SSL certificate
          <input id="u_verify" type="checkbox" /></label>
      </div>
      <button id="testBtn">Test Connection</button>
      <span id="testStatus" class="status"></span>

      <h2>LLM Provider</h2>
      <div class="grid">
        <label>Provider
          <select id="l_provider">
            <option value="ollama">Ollama (local)</option>
            <option value="lmstudio">LM Studio (local)</option>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI</option>
            <option value="google">Google (Gemini)</option>
          </select>
        </label>
        <label>Model
          <input id="l_model" list="modelList" placeholder="model id" />
          <datalist id="modelList"></datalist>
        </label>
        <label id="apiKeyWrap">API Key<input id="l_key" type="password" autocomplete="new-password" /></label>
        <label>Base URL (override / local)<input id="l_base" placeholder="auto" /></label>
        <label>Temperature<input id="l_temp" type="number" step="0.1" value="0.1" /></label>
        <label>Max output tokens<input id="l_maxtok" type="number" value="8000" /></label>
      </div>
      <button id="refreshModels">↻ Detect local models</button>
      <span id="modelStatus" class="status"></span>

      <div class="save-row">
        <button id="saveBtn" class="primary">Save Settings</button>
        <span id="saveStatus" class="status"></span>
      </div>
    </section>
  </main>

  <!-- Section data viewer modal -->
  <div id="dataModal" class="modal hidden">
    <div class="modal-body">
      <button class="close" id="dataModalClose">✕</button>
      <div class="data-head">
        <h3 id="dataTitle"></h3>
        <div class="data-actions">
          <button id="dataCopyBtn" class="small">⧉ Copy</button>
          <button id="dataDownloadBtn" class="small">⬇ Download</button>
        </div>
      </div>
      <div id="dataMeta" class="muted"></div>
      <pre id="dataJson" class="json-view"></pre>
    </div>
  </div>

  <!-- Issue detail modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-body">
      <button class="close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
