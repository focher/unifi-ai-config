name: Security Scan

# Static analysis (bandit) + dependency vulnerability audit (pip-audit) on every
# push and PR to main, and weekly so newly-disclosed CVEs surface over time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit

      - name: Static analysis (bandit)
        run: bandit -r backend run.py build.py -ll

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt --strict
