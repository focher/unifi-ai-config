name: Build & Release

# Builds standalone binaries for macOS, Windows, and Linux whenever a version
# tag (v*) is pushed, and attaches them to the GitHub Release.
# The macOS binary is a universal2 (arm64 + x86_64) build, produced by building
# each architecture on its native runner and lipo-merging them.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- Windows + Linux: single native build each ----
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unifi-ai-auditor-windows
            ext: ".exe"
          - os: ubuntu-latest
            artifact: unifi-ai-auditor-linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone binary
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "dist/unifi-ai-auditor${{ matrix.ext }}" "out/${{ matrix.artifact }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*

  # ---- macOS: build each arch natively, then lipo into a universal binary ----
  build-macos-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14   # Apple Silicon
            arch: arm64
          - os: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone binary
        run: python build.py

      - name: Verify architecture
        run: |
          lipo -archs dist/unifi-ai-auditor
          test "$(lipo -archs dist/unifi-ai-auditor)" = "${{ matrix.arch }}"
          mkdir -p out
          cp dist/unifi-ai-auditor "out/unifi-ai-auditor-macos-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: out/*

  macos-universal:
    needs: build-macos-arch
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: macos-*
          path: arch
          merge-multiple: true

      - name: Create universal2 binary
        run: |
          mkdir -p out
          lipo -create \
            arch/unifi-ai-auditor-macos-arm64 \
            arch/unifi-ai-auditor-macos-x86_64 \
            -output out/unifi-ai-auditor-macos
          chmod +x out/unifi-ai-auditor-macos
          echo "Architectures in final binary:"
          lipo -archs out/unifi-ai-auditor-macos
          file out/unifi-ai-auditor-macos

      - uses: actions/upload-artifact@v7
        with:
          name: unifi-ai-auditor-macos
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
