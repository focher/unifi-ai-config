name: Build & Release

# Builds standalone binaries for macOS, Windows, and Linux whenever a version
# tag (v*) is pushed, and attaches them to the GitHub Release.
# The macOS binary is a universal2 (arm64 + x86_64) build, produced by building
# each architecture on its native runner and lipo-merging them.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- Windows + Linux: single native build each ----
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unifi-ai-auditor-windows
            ext: ".exe"
          - os: ubuntu-latest
            artifact: unifi-ai-auditor-linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone binary
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "dist/unifi-ai-auditor${{ matrix.ext }}" "out/${{ matrix.artifact }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*

  # ---- macOS: build arm64 natively + x86_64 under Rosetta on one Apple-Silicon
  #      runner, then lipo-merge into a universal2 binary. Avoids depending on the
  #      scarce Intel (macos-13) hosted runners. ----
  build-macos:
    runs-on: macos-14   # Apple Silicon; Rosetta 2 is preinstalled
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build arm64 slice (native)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          python build.py
          mkdir -p slices
          cp dist/unifi-ai-auditor slices/arm64
          echo "arm64 slice:"; lipo -archs slices/arm64
          test "$(lipo -archs slices/arm64)" = "arm64"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Build x86_64 slice (uv x86_64 Python, via Rosetta)
        run: |
          uv python install cpython-3.13-macos-x86_64
          uv venv --python cpython-3.13-macos-x86_64 .venv-x64
          uv pip install --python .venv-x64 -r requirements.txt pyinstaller
          .venv-x64/bin/python build.py
          cp dist/unifi-ai-auditor slices/x86_64
          echo "x86_64 slice:"; lipo -archs slices/x86_64
          test "$(lipo -archs slices/x86_64)" = "x86_64"

      - name: Merge universal2 binary
        run: |
          mkdir -p out
          lipo -create slices/arm64 slices/x86_64 -output out/unifi-ai-auditor-macos
          chmod +x out/unifi-ai-auditor-macos
          echo "Final architectures:"; lipo -archs out/unifi-ai-auditor-macos
          file out/unifi-ai-auditor-macos
          test "$(lipo -archs out/unifi-ai-auditor-macos)" = "x86_64 arm64"

      - uses: actions/upload-artifact@v7
        with:
          name: unifi-ai-auditor-macos
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
