name: Build & Release

# Builds standalone binaries for macOS, Windows, and Linux whenever a version
# tag (v*) is pushed, and attaches them to the GitHub Release.
# The macOS binary is a universal2 (arm64 + x86_64) build, produced by building
# each architecture on its native runner and lipo-merging them.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- Windows + Linux: single native build each ----
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unifi-ai-auditor-windows
            ext: ".exe"
          - os: ubuntu-latest
            artifact: unifi-ai-auditor-linux
            ext: ""
    runs-on: ${{ matrix.os }}
    env:
      # Authenticode signing activates automatically when these secrets are set.
      WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WIN_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone binary
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "dist/unifi-ai-auditor${{ matrix.ext }}" "out/${{ matrix.artifact }}${{ matrix.ext }}"
          # Linux release assets lose the exec bit in transit; nothing to sign — users
          # chmod +x. Keep it executable in the artifact for convenience.
          chmod +x "out/${{ matrix.artifact }}${{ matrix.ext }}" || true

      - name: Sign Windows executable (only if a certificate secret is present)
        if: runner.os == 'Windows' && env.WIN_CERT != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CERT))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /f $pfx /p $env:WIN_PWD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 "out\${{ matrix.artifact }}.exe"
          & $signtool verify /pa "out\${{ matrix.artifact }}.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*

  # ---- macOS: a true universal2 onefile. Two onefile builds CANNOT be lipo-merged
  #      (each appends an arch-specific Python runtime), so we build once with a
  #      universal2 Python (python.org) and --target-architecture universal2. The
  #      only compiled dependency, pydantic_core, ships no universal2 wheel, so we
  #      synthesize one by lipo-merging its per-arch .so before building. ----
  build-macos:
    runs-on: macos-14   # Apple Silicon; Rosetta 2 is preinstalled (for the smoke test)
    env:
      PYVER: "3.13.14"
      # Developer ID signing + notarization activate automatically when set.
      MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERT_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      MACOS_SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
      AC_NOTARY_USER: ${{ secrets.AC_NOTARY_USER }}
      AC_NOTARY_PASSWORD: ${{ secrets.AC_NOTARY_PASSWORD }}
      AC_NOTARY_TEAM_ID: ${{ secrets.AC_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install universal2 Python from python.org
        run: |
          curl -fLO "https://www.python.org/ftp/python/${PYVER}/python-${PYVER}-macos11.pkg"
          sudo installer -pkg "python-${PYVER}-macos11.pkg" -target /
          echo "PY=/Library/Frameworks/Python.framework/Versions/3.13/bin/python3" >> "$GITHUB_ENV"

      - name: Verify Python is universal2
        run: |
          lipo -archs "$(${PY} -c 'import sys;print(sys.executable)')" || true
          lipo -archs /Library/Frameworks/Python.framework/Versions/3.13/Python
          test "$(lipo -archs /Library/Frameworks/Python.framework/Versions/3.13/Python)" = "x86_64 arm64"

      - name: Install dependencies
        run: |
          "$PY" -m venv .venv-u2
          . .venv-u2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Make pydantic_core universal2 (lipo-merge per-arch .so)
        run: |
          . .venv-u2/bin/activate
          PCVER=$(python -c "import importlib.metadata as m; print(m.version('pydantic_core'))")
          SO=$(python -c "import pydantic_core, glob, os; print(glob.glob(os.path.join(os.path.dirname(pydantic_core.__file__), '_pydantic_core*.so'))[0])")
          echo "pydantic_core $PCVER -> $SO"
          rm -rf /tmp/arm /tmp/x64 && mkdir -p /tmp/arm /tmp/x64
          pip download "pydantic_core==$PCVER" --no-deps --only-binary=:all: \
            --platform macosx_11_0_arm64 --python-version 3.13 --implementation cp --abi cp313 -d /tmp/arm
          pip download "pydantic_core==$PCVER" --no-deps --only-binary=:all: \
            --platform macosx_10_12_x86_64 --python-version 3.13 --implementation cp --abi cp313 -d /tmp/x64
          (cd /tmp/arm && unzip -o ./*.whl >/dev/null); (cd /tmp/x64 && unzip -o ./*.whl >/dev/null)
          ARM_SO=$(find /tmp/arm -name '_pydantic_core*.so' | head -1)
          X64_SO=$(find /tmp/x64 -name '_pydantic_core*.so' | head -1)
          lipo -create "$ARM_SO" "$X64_SO" -output "$SO"
          echo "merged pydantic_core:"; lipo -archs "$SO"
          test "$(lipo -archs "$SO")" = "x86_64 arm64"

      - name: Build universal2 binary
        run: |
          . .venv-u2/bin/activate
          BUILD_ARCH=universal2 python build.py
          mkdir -p out
          cp dist/unifi-ai-auditor out/unifi-ai-auditor-macos
          echo "Final architectures:"; lipo -archs out/unifi-ai-auditor-macos
          file out/unifi-ai-auditor-macos
          test "$(lipo -archs out/unifi-ai-auditor-macos)" = "x86_64 arm64"

      - name: Sign macOS binary (Developer ID if available, else ad-hoc)
        run: |
          set -e
          BIN=out/unifi-ai-auditor-macos
          if [ -n "$MACOS_CERT" ]; then
            echo "Importing Developer ID certificate and signing…"
            echo "$MACOS_CERT" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            KC="$RUNNER_TEMP/build.keychain"
            security create-keychain -p actions "$KC"
            security default-keychain -s "$KC"
            security unlock-keychain -p actions "$KC"
            security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$MACOS_CERT_PWD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KC" >/dev/null
            codesign --force --options runtime --timestamp --sign "$MACOS_SIGN_ID" "$BIN"
          else
            # Ad-hoc signature: required for arm64 Mach-O to be loadable and keeps the
            # binary from being flagged as "damaged". Does NOT clear Gatekeeper
            # quarantine on download — that needs Developer ID + notarization.
            echo "No Developer ID cert; applying ad-hoc signature."
            codesign --force --sign - --timestamp=none "$BIN"
          fi
          codesign --verify --verbose=2 "$BIN"
          codesign --display --verbose=2 "$BIN" || true

      - name: Notarize & staple (only if Developer ID + notary creds are present)
        if: env.MACOS_CERT != '' && env.AC_NOTARY_USER != ''
        run: |
          set -e
          BIN=out/unifi-ai-auditor-macos
          ditto -c -k --keepParent "$BIN" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$AC_NOTARY_USER" --password "$AC_NOTARY_PASSWORD" \
            --team-id "$AC_NOTARY_TEAM_ID" --wait
          # Note: a notarization ticket cannot be stapled to a bare executable (only
          # to .app/.dmg/.pkg). Gatekeeper verifies online for the bare binary. For
          # fully offline, warning-free launch, package as a notarized .dmg.

      - name: Smoke-test both slices (arm64 native + x86_64 via Rosetta)
        run: |
          set -e
          for a in arm64 x86_64; do
            echo "--- testing $a slice ---"
            arch -$a ./out/unifi-ai-auditor-macos --port 8799 --no-browser >/tmp/run-$a.log 2>&1 &
            PID=$!
            ok=
            for i in $(seq 1 30); do
              if curl -fs -o /dev/null "http://127.0.0.1:8799/api/settings"; then ok=1; break; fi
              sleep 1
            done
            kill $PID 2>/dev/null || true
            cat /tmp/run-$a.log
            test -n "$ok" || { echo "::error::$a slice failed to serve"; exit 1; }
            echo "$a slice OK"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: unifi-ai-auditor-macos
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
